<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K2 Menu</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  --a:  #00c3ff;
  --a2: #0055ff;
  --bg0:#03040a;
  --bg1:#07090f;
  --bg2:#0a0d16;
  --bg3:#0e121e;
  --bg4:#131826;
  --border:rgba(255,255,255,0.055);
  --text:#dde2f2;
  --muted:#3a4260;
  --dim:#0d1020;
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100vw;height:100vh;
  overflow:hidden;
  background:transparent;
  font-family:'Inter',sans-serif;
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}

/* ══ SNOW ══ */
#snow{position:fixed;inset:0;pointer-events:none;z-index:0;}

/* ══ ALERTS (top-left) ══ */
#alerts{
  position:fixed;top:16px;left:16px;z-index:500;
  display:flex;flex-direction:column;gap:5px;
  width:240px;pointer-events:none;
}
.alert{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;
  background:rgba(3,4,10,0.92);
  border:1px solid var(--border);
  border-radius:6px;
  backdrop-filter:blur(12px);
  animation:aIn .25s cubic-bezier(.16,1,.3,1) both;
  position:relative;overflow:hidden;
}
.alert::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
}
.alert.info::before  {background:var(--a);}
.alert.ok::before    {background:#00ff88;}
.alert.warn::before  {background:#ffc800;}
.alert.err::before   {background:#ff4444;}
.alert.troll::before {background:#ff9000;}
@keyframes aIn{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:none}}
@keyframes aOut{from{opacity:1;transform:none}to{opacity:0;transform:translateX(-16px)}}
.alert.removing{animation:aOut .2s ease both;}
.a-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.a-text{flex:1;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace;letter-spacing:.3px;color:var(--text);}
.a-time{font-size:8px;color:var(--muted);font-family:'JetBrains Mono',monospace;}

/* ══ HUD (bottom-left) ══ */
#hud{
  position:fixed;bottom:30px;left:16px;
  display:flex;flex-direction:column;gap:4px;
  pointer-events:none;z-index:100;
  opacity:0;transition:opacity .3s;
}
#hud.visible{opacity:1;}
.hud-row{
  display:flex;align-items:center;gap:6px;
  font-size:10px;font-family:'JetBrains Mono',monospace;
}
.hud-label{color:var(--muted);font-weight:600;width:36px;}
.hud-val{color:var(--text);}
.hud-bar{width:60px;height:2px;background:var(--bg4);border-radius:2px;overflow:hidden;}
.hud-fill{height:100%;border-radius:2px;transition:width .3s;}
.hud-feats{
  display:flex;gap:4px;flex-wrap:wrap;margin-top:2px;
}
.hud-feat{
  font-size:8px;font-weight:700;font-family:'JetBrains Mono',monospace;
  padding:1px 5px;border-radius:3px;
  background:rgba(0,195,255,.12);color:var(--a);
  letter-spacing:.5px;
}

/* ══ MENU WRAPPER ══ */
#menu{
  position:fixed;
  top:0;left:0;
  width:100vw;height:100vh;
  pointer-events:none;
  z-index:200;
  opacity:0;
  transition:opacity .2s ease;
}
#menu.open{opacity:1;pointer-events:all;}

/* ══ MENU SHELL ══ */
.shell{
  position:absolute;
  top:5vh;left:1.5vw;
  display:flex;
  height:90vh;
  max-height:600px;
  border-radius:10px;
  overflow:hidden;
  border:1px solid var(--border);
  box-shadow:
    0 0 0 1px rgba(0,195,255,.03),
    0 0 80px rgba(0,195,255,.06),
    0 40px 100px rgba(0,0,0,.97);
  animation:shellIn .35s cubic-bezier(.16,1,.3,1) both;
}
@keyframes shellIn{
  from{opacity:0;transform:translateY(20px) scale(.98);}
  to{opacity:1;transform:none;}
}

/* ══ RAIL (icon nav) ══ */
.rail{
  width:46px;
  background:var(--bg1);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;
  padding:10px 0 8px;gap:1px;flex-shrink:0;
}
.rail-logo{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;font-weight:700;color:var(--a);
  text-align:center;width:100%;
  padding-bottom:8px;margin-bottom:4px;
  border-bottom:1px solid var(--border);
  letter-spacing:1px;
}
.ri{
  width:30px;height:30px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;cursor:pointer;
  transition:all .12s;color:var(--muted);
  position:relative;
}
.ri:hover{background:var(--bg3);color:var(--text);}
.ri.on{background:rgba(0,195,255,.1);color:var(--a);}
.ri.on::before{
  content:'';position:absolute;left:-1px;top:50%;
  transform:translateY(-50%);
  width:2px;height:14px;
  background:var(--a);border-radius:0 2px 2px 0;
  box-shadow:0 0 6px var(--a);
}
.ri-tip{
  position:absolute;left:38px;
  background:var(--bg4);border:1px solid var(--border);
  color:var(--text);font-size:8.5px;font-weight:600;
  padding:3px 7px;border-radius:4px;
  white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .1s;z-index:99;
  font-family:'JetBrains Mono',monospace;letter-spacing:.5px;
}
.ri:hover .ri-tip{opacity:1;}
.rsep{width:22px;height:1px;background:var(--border);margin:4px 0;}
.ri-bot{margin-top:auto;}
.sec-dot{
  position:absolute;top:3px;right:3px;
  width:5px;height:5px;border-radius:50%;
  background:var(--a);box-shadow:0 0 4px var(--a);
}

/* ══ CAT PANEL ══ */
.cat{
  width:165px;background:var(--bg1);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;
}
.cat-hdr{padding:12px 11px 8px;border-bottom:1px solid var(--border);flex-shrink:0;}
.cat-lbl{font-size:7.5px;font-weight:700;letter-spacing:2.5px;color:var(--muted);text-transform:uppercase;margin-bottom:2px;}
.cat-name{font-size:13px;font-weight:800;color:var(--text);letter-spacing:-.4px;}
.cat-body{flex:1;padding:4px;overflow-y:auto;}
.cat-body::-webkit-scrollbar{width:2px;}
.cat-body::-webkit-scrollbar-thumb{background:var(--dim);}

.ci{
  display:flex;align-items:center;gap:6px;
  padding:5.5px 7px;border-radius:5px;
  cursor:pointer;transition:all .1s;
  margin-bottom:1px;position:relative;
}
.ci:hover{background:var(--bg3);}
.ci.on{background:rgba(0,195,255,.07);}
.ci.on::after{
  content:'';position:absolute;right:7px;top:50%;
  transform:translateY(-50%);
  width:3px;height:3px;border-radius:50%;
  background:var(--a);box-shadow:0 0 4px var(--a);
}
.ci-ic{font-size:11px;width:14px;text-align:center;flex-shrink:0;}
.ci-n{font-size:10.5px;font-weight:500;color:var(--muted);transition:color .1s;}
.ci:hover .ci-n,.ci.on .ci-n{color:var(--text);}

/* ══ ITEMS PANEL ══ */
.items{
  width:195px;background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;
}
.items-hdr{
  padding:11px 11px 7px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:6px;flex-shrink:0;
}
.items-back{
  width:18px;height:18px;border-radius:3px;
  background:var(--bg3);display:flex;align-items:center;
  justify-content:center;cursor:pointer;font-size:10px;
  color:var(--muted);transition:all .1s;flex-shrink:0;
}
.items-back:hover{color:var(--text);background:var(--bg4);}
.items-title{font-size:10.5px;font-weight:600;color:var(--text);}
.items-body{flex:1;padding:4px;overflow-y:auto;}
.items-body::-webkit-scrollbar{width:2px;}
.items-body::-webkit-scrollbar-thumb{background:var(--dim);}

.sec-lbl{
  font-size:7px;font-weight:700;letter-spacing:2px;
  color:var(--muted);text-transform:uppercase;
  padding:7px 7px 3px;
}
.li{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 7px;border-radius:4px;cursor:pointer;
  transition:all .1s;margin-bottom:1px;
}
.li:hover{background:var(--bg4);}
.li.on{background:rgba(0,195,255,.06);}
.li-l{display:flex;align-items:center;gap:6px;}
.li-dot{
  width:3px;height:3px;border-radius:50%;
  background:var(--dim);flex-shrink:0;transition:all .1s;
}
.li:hover .li-dot,.li.on .li-dot{
  background:var(--a);box-shadow:0 0 4px var(--a);
}
.li-n{font-size:10.5px;font-weight:500;color:var(--muted);transition:color .1s;}
.li:hover .li-n,.li.on .li-n{color:var(--text);}
.badge{
  font-size:7.5px;font-weight:700;
  font-family:'JetBrains Mono',monospace;
  padding:1px 5px;border-radius:3px;letter-spacing:.5px;
}
.bc {background:rgba(0,195,255,.1); color:#00c3ff;}
.bg2{background:rgba(0,255,130,.1); color:#00ff88;}
.bo {background:rgba(255,200,0,.1); color:#ffc800;}
.br {background:rgba(255,60,60,.1); color:#ff4444;}
.bp {background:rgba(160,80,255,.1);color:#b464ff;}
.bor{background:rgba(255,140,0,.1); color:#ff9000;}
.bgr{background:rgba(255,255,255,.06);color:#555;}
.li-arr{color:var(--dim);font-size:10px;}
.li:hover .li-arr,.li.on .li-arr{color:var(--a);}

/* toggle switch */
.sw{
  width:26px;height:13px;border-radius:7px;
  background:var(--bg4);border:1px solid var(--border);
  position:relative;cursor:pointer;transition:background .2s;
  flex-shrink:0;
}
.sw.on{background:rgba(0,195,255,.25);border-color:rgba(0,195,255,.4);}
.sw::after{
  content:'';position:absolute;top:2px;left:2px;
  width:7px;height:7px;border-radius:50%;
  background:var(--muted);transition:all .2s;
}
.sw.on::after{left:15px;background:var(--a);box-shadow:0 0 4px var(--a);}

/* ══ PREVIEW PANEL ══ */
.preview{
  flex:1;min-width:0;background:var(--bg0);
  display:flex;flex-direction:column;overflow:hidden;
}
.prev-hdr{
  padding:11px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.prev-hl{display:flex;flex-direction:column;gap:2px;}
.prev-lbl{font-size:7px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.prev-name{font-size:12px;font-weight:700;color:var(--text);letter-spacing:-.3px;}
.prev-tag{
  font-size:7.5px;font-weight:700;
  font-family:'JetBrains Mono',monospace;
  color:var(--a);border:1px solid rgba(0,195,255,.18);
  background:rgba(0,195,255,.05);
  padding:2px 7px;border-radius:3px;letter-spacing:1px;
}
.prev-body{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;
  padding:14px 16px;gap:10px;overflow-y:auto;
}
.prev-body::-webkit-scrollbar{width:2px;}
.prev-body::-webkit-scrollbar-thumb{background:var(--dim);}

/* vehicle card */
.vcard{
  width:100%;background:var(--bg1);
  border:1px solid var(--border);border-radius:8px;overflow:hidden;flex-shrink:0;
}
.vimg{
  height:100px;background:linear-gradient(180deg,var(--bg2),var(--bg0));
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.vimg::after{
  content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:80px;height:20px;
  background:radial-gradient(ellipse,rgba(0,195,255,.1),transparent 70%);
}
.vem{
  font-size:48px;z-index:1;
  filter:drop-shadow(0 4px 16px rgba(0,195,255,.2));
  animation:fl 3s ease-in-out infinite;
}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.vinf{padding:9px 11px;}
.vname{font-size:12px;font-weight:800;color:var(--text);letter-spacing:-.5px;}
.vmeta{font-size:8px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin:2px 0 7px;}
.stat{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.sl{font-size:7.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;width:42px;}
.sb{flex:1;height:2px;background:var(--bg4);border-radius:2px;overflow:hidden;}
.sf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--a2),var(--a));transition:width .4s ease;}
.sv{font-size:8px;font-family:'JetBrains Mono',monospace;color:var(--muted);width:20px;text-align:right;}

/* spawn btn */
.spbtn{
  width:100%;padding:7px;
  background:rgba(0,195,255,.07);
  border:1px solid rgba(0,195,255,.13);
  border-radius:6px;font-size:9.5px;font-weight:700;
  color:var(--a);cursor:pointer;transition:all .15s;
  text-align:center;
  font-family:'JetBrains Mono',monospace;
  letter-spacing:1.5px;text-transform:uppercase;
}
.spbtn:hover{background:rgba(0,195,255,.13);border-color:rgba(0,195,255,.3);}

/* info card */
.icard{
  width:100%;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.ic-icon{font-size:36px;opacity:.5;}
.ic-name{font-size:13px;font-weight:700;color:var(--text);}
.ic-sub{font-size:9px;color:var(--muted);font-weight:500;}
.ic-btn{
  padding:6px 16px;
  background:rgba(0,195,255,.07);border:1px solid rgba(0,195,255,.13);
  border-radius:5px;font-size:9px;font-weight:700;color:var(--a);
  cursor:pointer;transition:all .15s;
  font-family:'JetBrains Mono',monospace;letter-spacing:1px;text-transform:uppercase;
}
.ic-btn:hover{background:rgba(0,195,255,.13);}

/* toggle grid */
.tgrid{width:100%;display:flex;flex-direction:column;gap:4px;}
.trow{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 9px;background:var(--bg1);
  border:1px solid var(--border);border-radius:5px;
}
.tn{font-size:10px;font-weight:600;color:var(--muted);}

/* code card */
.ccard{
  width:100%;background:var(--bg1);
  border:1px solid var(--border);border-radius:7px;overflow:hidden;
}
.ccard-hdr{display:flex;align-items:center;gap:7px;padding:7px 10px;}
.ccard-desc{font-size:10px;font-weight:600;color:var(--text);flex:1;}
.ccard-copy{
  font-size:7.5px;font-weight:700;color:var(--a);
  font-family:'JetBrains Mono',monospace;
  cursor:pointer;padding:2px 5px;border:1px solid rgba(0,195,255,.2);
  border-radius:3px;opacity:.7;
}
.ccard-copy:hover{opacity:1;background:rgba(0,195,255,.08);}
.ccard-body{padding:0 10px 8px;}
.ccode{
  font-size:8.5px;font-family:'JetBrains Mono',monospace;
  color:#7ecfff;background:var(--bg0);
  border:1px solid var(--border);border-radius:4px;
  padding:7px 9px;line-height:1.6;word-break:break-all;
}
.cnote{font-size:8px;color:var(--muted);margin-top:4px;font-style:italic;}

/* sinfo */
.srow{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 9px;background:var(--bg1);
  border:1px solid var(--border);border-radius:5px;
}
.srow-l{font-size:10px;font-weight:600;color:var(--muted);}
.srow-v{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--a);}

/* ══ KEYS BAR ══ */
.keys-bar{
  position:fixed;bottom:0;left:0;right:0;height:24px;
  background:var(--bg1);border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;gap:18px;z-index:300;
  opacity:0;transition:opacity .2s;pointer-events:none;
}
#menu.open ~ .keys-bar{opacity:1;}
.kk{display:flex;align-items:center;gap:4px;font-size:8px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.kk kbd{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:3px;padding:1px 5px;font-size:8px;
  color:var(--text);font-family:'JetBrains Mono',monospace;
}

/* ══ SLIDE ANIM ══ */
.sld{animation:sld .15s cubic-bezier(.16,1,.3,1) both;}
@keyframes sld{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<canvas id="snow"></canvas>

<!-- Alerts -->
<div id="alerts"></div>

<!-- HUD -->
<div id="hud">
  <div class="hud-row">
    <span class="hud-label">HP</span>
    <div class="hud-bar"><div class="hud-fill" id="hud-hp" style="width:100%;background:#00ff88;"></div></div>
    <span class="hud-val" id="hud-hp-v">200</span>
  </div>
  <div class="hud-row">
    <span class="hud-label">ARM</span>
    <div class="hud-bar"><div class="hud-fill" id="hud-arm" style="width:100%;background:#00c3ff;"></div></div>
    <span class="hud-val" id="hud-arm-v">100</span>
  </div>
  <div class="hud-row" id="hud-speed-row" style="display:none">
    <span class="hud-label">SPD</span>
    <div class="hud-bar"><div class="hud-fill" id="hud-spd" style="width:0%;background:#ffc800;"></div></div>
    <span class="hud-val" id="hud-spd-v">0</span>
  </div>
  <div class="hud-feats" id="hud-feats"></div>
</div>

<!-- Menu -->
<div id="menu">
  <div class="shell">

    <!-- Rail -->
    <nav class="rail" id="rail">
      <div class="rail-logo">K2</div>
      <div class="ri on" data-nav="vehicle">🚗<span class="ri-tip">VEHICLE</span></div>
      <div class="ri" data-nav="teleport">🗺️<span class="ri-tip">TELEPORT</span></div>
      <div class="ri" data-nav="weapons">🔫<span class="ri-tip">WEAPONS</span></div>
      <div class="ri" data-nav="player">❤️<span class="ri-tip">PLAYER</span></div>
      <div class="ri" data-nav="weather">🌤️<span class="ri-tip">WEATHER</span></div>
      <div class="ri" data-nav="abilities">🛡️<span class="ri-tip">ABILITIES</span></div>
      <div class="ri" data-nav="esp">👁️<span class="ri-tip">ESP</span></div>
      <div class="ri" data-nav="troll">😈<span class="ri-tip">TROLL</span></div>
      <div class="ri" data-nav="anims">🎭<span class="ri-tip">ANIMS</span></div>
      <div class="ri" data-nav="server">🖥️<span class="ri-tip">SERVER</span></div>
      <div class="rsep"></div>
      <div class="ri" data-nav="esx">🟣<span class="ri-tip">ESX</span><span class="sec-dot"></span></div>
      <div class="ri" data-nav="qb">🟡<span class="ri-tip">QBCORE</span><span class="sec-dot" style="background:#ffc800;box-shadow:0 0 4px #ffc800"></span></div>
      <div class="rsep"></div>
      <div class="ri ri-bot" data-nav="settings">⚙️<span class="ri-tip">SETTINGS</span></div>
    </nav>

    <!-- Cat Panel -->
    <div class="cat">
      <div class="cat-hdr">
        <div class="cat-lbl" id="cat-lbl">CATEGORY</div>
        <div class="cat-name" id="cat-name">Vehicle</div>
      </div>
      <div class="cat-body" id="cat-body"></div>
    </div>

    <!-- Items Panel -->
    <div class="items">
      <div class="items-hdr">
        <div class="items-back" id="items-back">‹</div>
        <div class="items-title" id="items-title">—</div>
      </div>
      <div class="items-body" id="items-body"></div>
    </div>

    <!-- Preview Panel -->
    <div class="preview">
      <div class="prev-hdr">
        <div class="prev-hl">
          <div class="prev-lbl">PREVIEW</div>
          <div class="prev-name" id="prev-name">—</div>
        </div>
        <div class="prev-tag" id="prev-tag">INFO</div>
      </div>
      <div class="prev-body" id="prev-body"></div>
    </div>

  </div>
</div>

<!-- Keys bar -->
<div class="keys-bar">
  <div class="kk"><kbd>↑↓</kbd> Navigate</div>
  <div class="kk"><kbd>ENTER</kbd> Select</div>
  <div class="kk"><kbd>BACK</kbd> Return</div>
  <div class="kk"><kbd>←→</kbd> Value</div>
  <div class="kk"><kbd>INSERT</kbd> Toggle</div>
  <div class="kk"><kbd>F6</kbd> Close</div>
</div>

<script>
// ══ SNOW ══
const cv=document.getElementById('snow');
const cx=cv.getContext('2d');
let W,H,fl=[];
function rsz(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
rsz();addEventListener('resize',rsz);
for(let i=0;i<70;i++)fl.push({x:Math.random()*1920,y:Math.random()*1080,r:Math.random()*1.5+.3,s:Math.random()*.4+.1,d:(Math.random()-.5)*.18,a:Math.random()*.28+.05});
(function loop(){
  cx.clearRect(0,0,W,H);
  fl.forEach(f=>{
    cx.beginPath();cx.arc(f.x,f.y,f.r,0,Math.PI*2);
    cx.fillStyle=`rgba(255,255,255,${f.a})`;cx.fill();
    f.y+=f.s;f.x+=f.d;
    if(f.y>H+4){f.y=-4;f.x=Math.random()*W;}
    if(f.x<0)f.x=W;if(f.x>W)f.x=0;
  });
  requestAnimationFrame(loop);
})();

// ══ ALERT SYSTEM ══
let alertId=0;
function addAlert(text,type='info'){
  const panel=document.getElementById('alerts');
  const id=++alertId;
  const now=new Date();
  const time=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0')+':'+now.getSeconds().toString().padStart(2,'0');
  const colors={info:'#00c3ff',ok:'#00ff88',warn:'#ffc800',err:'#ff4444',troll:'#ff9000'};
  const el=document.createElement('div');
  el.className=`alert ${type}`;
  el.id='al-'+id;
  el.innerHTML=`<div class="a-dot" style="background:${colors[type]||colors.info};box-shadow:0 0 5px ${colors[type]||colors.info}"></div><div class="a-text">${text}</div><div class="a-time">${time}</div>`;
  panel.appendChild(el);
  setTimeout(()=>{
    const e=document.getElementById('al-'+id);
    if(e){e.classList.add('removing');setTimeout(()=>e.remove(),220);}
  },7000);
}

// ══ STATE ══
let curNav='vehicle', curCat='vanilla', toggleStates={};
const menuEl=document.getElementById('menu');

// ══ RENDER NAV ══
function switchNav(key){
  document.querySelectorAll('.ri').forEach(r=>r.classList.remove('on'));
  document.querySelector(`[data-nav="${key}"]`)?.classList.add('on');
  curNav=key;
  const d=NAV[key];
  document.getElementById('cat-lbl').textContent=d.lbl;
  document.getElementById('cat-name').textContent=d.name;
  renderCats(d.cats);
  sendToLua({type:'notify',text:'> '+d.name.toUpperCase(),color:'info'});
}

function renderCats(cats){
  const el=document.getElementById('cat-body');
  el.innerHTML='';
  cats.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='ci'+(i===0?' on':'');
    d.innerHTML=`<div class="ci-ic">${c.ic}</div><div class="ci-n">${c.n}</div>`;
    d.onclick=()=>{
      document.querySelectorAll('.ci').forEach(x=>x.classList.remove('on'));
      d.classList.add('on');
      curCat=c.k;
      renderItems(c.k);
    };
    el.appendChild(d);
    if(i===0){curCat=c.k;renderItems(c.k);}
  });
}

function renderItems(key){
  const data=ITEMS[key];
  const el=document.getElementById('items-body');
  const titleEl=document.getElementById('items-title');
  el.innerHTML='';
  el.classList.add('sld');
  setTimeout(()=>el.classList.remove('sld'),200);
  if(!data){titleEl.textContent=key;showInfoPreview({n:key,em:'⚙️'});return;}
  titleEl.textContent=data.title;

  if(data.type==='vehicles'){
    data.items.forEach((item,i)=>{
      const d=buildLI(item,i===0);
      d.onclick=()=>{
        document.querySelectorAll('.li').forEach(x=>x.classList.remove('on'));
        d.classList.add('on');
        showVehiclePreview(item);
      };
      el.appendChild(d);
      if(i===0)showVehiclePreview(item);
    });
  } else if(data.type==='toggles'){
    data.items.forEach((item,i)=>{
      const d=buildLI(item,i===0);
      el.appendChild(d);
      if(i===0)showTogglePreview(data.items);
    });
    showTogglePreview(data.items);
  } else if(data.type==='sinfo'){
    data.items.forEach(item=>{
      const row=document.createElement('div');
      row.className='srow';
      row.style.margin='0 0 4px 0';
      row.innerHTML=`<span class="srow-l">${item.n}</span><span class="srow-v">${item.l}</span>`;
      el.appendChild(row);
    });
    showInfoPreview({n:'Server',em:'🖥️'});
  } else {
    // list with sections
    let first=true;
    (data.secs||[]).forEach(sec=>{
      const sl=document.createElement('div');
      sl.className='sec-lbl';sl.textContent=sec.l;el.appendChild(sl);
      (sec.items||[]).forEach(item=>{
        const d=buildLI(item,first);
        if(first){showActionPreview(item);first=false;}
        d.onclick=()=>{
          document.querySelectorAll('.li').forEach(x=>x.classList.remove('on'));
          d.classList.add('on');
          showActionPreview(item);
        };
        el.appendChild(d);
      });
    });
  }
}

function buildLI(item,isOn){
  const d=document.createElement('div');
  d.className='li'+(isOn?' on':'');
  let right='<span class="li-arr">›</span>';
  if(item.b) right=`<span class="badge ${item.bc||'bc'}">${item.b}</span>`;
  if(item.tog){
    const on=toggleStates[item.action]||false;
    right=`<div class="sw${on?' on':''}" data-action="${item.action}"></div>`;
  }
  d.innerHTML=`<div class="li-l"><div class="li-dot"></div><div class="li-n">${item.n}</div></div>${right}`;
  d.onclick=()=>{
    document.querySelectorAll('.li').forEach(x=>x.classList.remove('on'));
    d.classList.add('on');
    if(item.action) executeAction(item.action,item);
  };
  return d;
}

// ══ PREVIEW RENDERERS ══
function showVehiclePreview(item){
  document.getElementById('prev-name').textContent=item.n;
  document.getElementById('prev-tag').textContent=(item.cl||'VEH').toUpperCase();
  const body=document.getElementById('prev-body');
  body.classList.add('sld');setTimeout(()=>body.classList.remove('sld'),200);
  const hasStats=item.sp>0||item.ac>0||item.ha>0;
  body.innerHTML=`
    <div class="vcard">
      <div class="vimg"><div class="vem">${item.em||'🚗'}</div></div>
      <div class="vinf">
        <div class="vname">${item.n}</div>
        <div class="vmeta">${item.cl||'Vehicle'} — GTA V</div>
        ${hasStats?`
        <div class="stat"><div class="sl">Speed</div><div class="sb"><div class="sf" style="width:${item.sp}%"></div></div><div class="sv">${item.sp}</div></div>
        <div class="stat"><div class="sl">Accel</div><div class="sb"><div class="sf" style="width:${item.ac}%"></div></div><div class="sv">${item.ac}</div></div>
        <div class="stat"><div class="sl">Handle</div><div class="sb"><div class="sf" style="width:${item.ha}%"></div></div><div class="sv">${item.ha}</div></div>
        `:''}
      </div>
    </div>
    <div class="spbtn" onclick="executeAction('${item.action}',{})">[ ENTER ] SPAWN</div>`;
}

function showActionPreview(item){
  document.getElementById('prev-name').textContent=item.n;
  document.getElementById('prev-tag').textContent='ACTION';
  const body=document.getElementById('prev-body');
  body.classList.add('sld');setTimeout(()=>body.classList.remove('sld'),200);
  if(item.tog){
    const on=toggleStates[item.action]||false;
    body.innerHTML=`
      <div class="icard">
        <div class="ic-icon">${on?'✅':'⭕'}</div>
        <div class="ic-name">${item.n}</div>
        <div class="ic-sub">Press ENTER to toggle</div>
      </div>
      <div class="tgrid">
        <div class="trow">
          <span class="tn">${item.n}</span>
          <div class="sw${on?' on':''}" onclick="executeAction('${item.action}',{})"></div>
        </div>
      </div>`;
  } else {
    body.innerHTML=`
      <div class="icard">
        <div class="ic-icon">⚡</div>
        <div class="ic-name">${item.n}</div>
        <div class="ic-sub">Press ENTER to execute</div>
        <div class="ic-btn" onclick="executeAction('${item.action||''}',{})">[ ENTER ] EXECUTE</div>
      </div>`;
  }
}

function showInfoPreview(item){
  document.getElementById('prev-name').textContent=item.n;
  document.getElementById('prev-tag').textContent='INFO';
  document.getElementById('prev-body').innerHTML=`
    <div class="icard">
      <div class="ic-icon">${item.em||'⚙️'}</div>
      <div class="ic-name">${item.n}</div>
      <div class="ic-sub">Select from the list</div>
    </div>`;
}

function showTogglePreview(items){
  document.getElementById('prev-name').textContent='Toggles';
  document.getElementById('prev-tag').textContent='CONFIG';
  document.getElementById('prev-body').innerHTML=`
    <div class="tgrid">
      ${items.map(item=>{
        const on=toggleStates[item.action]||false;
        return `<div class="trow">
          <span class="tn">${item.n}</span>
          <div class="sw${on?' on':''}" onclick="executeAction('${item.action}',{})"></div>
        </div>`;
      }).join('')}
    </div>`;
}

// ══ EXECUTE ACTION ══
function executeAction(action, item){
  if(!action) return;
  // Toggle
  if(action.startsWith('toggle:')){
    const key=action.split(':')[1];
    toggleStates[action]=!toggleStates[action];
    // Update switches
    document.querySelectorAll(`[data-action="${action}"],.sw`).forEach(sw=>{
      if(sw.dataset && sw.dataset.action===action)
        sw.classList.toggle('on', toggleStates[action]);
    });
    const on=toggleStates[action];
    addAlert(`${item?.n||key}: ${on?'ON':'OFF'}`, on?'ok':'warn');
  }
  // Send to Lua
  sendToLua({type:'action',action,item});
}

// ══ SEND TO LUA ══
function sendToLua(data){
  // In DUI context, this sends messages to Lua via the DUI bridge
  if(window.invokeNative){
    window.invokeNative('sendMessage', JSON.stringify(data));
  }
}

// ══ RECEIVE FROM LUA ══
window.addEventListener('message', function(e){
  const d = e.data;
  if(!d || !d.type) return;

  switch(d.type){
    case 'toggle':
      // Toggle menu visibility
      menuEl.classList.toggle('open', d.show);
      break;
    case 'notify':
      addAlert(d.text, d.color||'info');
      break;
    case 'toggle_state':
      // Update toggle state
      if(d.key && d.value !== undefined){
        const actionKey = 'toggle:'+d.key;
        toggleStates[actionKey] = d.value;
      }
      break;
    case 'update_hud':
      // Update HUD values
      if(d.hp !== undefined){
        document.getElementById('hud-hp').style.width=(d.hp/200*100)+'%';
        document.getElementById('hud-hp-v').textContent=d.hp;
        document.getElementById('hud-hp').style.background=d.hp>150?'#00ff88':d.hp>80?'#ffc800':'#ff4444';
      }
      if(d.armor !== undefined){
        document.getElementById('hud-arm').style.width=d.armor+'%';
        document.getElementById('hud-arm-v').textContent=d.armor;
      }
      if(d.speed !== undefined){
        document.getElementById('hud-speed-row').style.display='flex';
        document.getElementById('hud-spd').style.width=Math.min(100,d.speed/300*100)+'%';
        document.getElementById('hud-spd-v').textContent=d.speed+'km/h';
      }
      if(d.features){
        document.getElementById('hud-feats').innerHTML=d.features.map(f=>`<span class="hud-feat">${f}</span>`).join('');
      }
      if(d.visible !== undefined){
        document.getElementById('hud').classList.toggle('visible',d.visible);
      }
      break;
    case 'players_update':
      // Update server info preview
      break;
  }
});

// ══ INIT ══
document.querySelectorAll('.ri').forEach(ri=>{
  ri.onclick=()=>switchNav(ri.dataset.nav);
});
document.getElementById('items-back').onclick=()=>{
  renderItems(curCat);
};

switchNav('vehicle');
addAlert('K2 MENU v5.0 — LOADED','ok');
setTimeout(()=>addAlert('Press INSERT to toggle menu','info'),1200);
</script>
