<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>K2 Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
:root{--a:26,107,255}
body{font-family:'Rajdhani',sans-serif;background:transparent;width:100vw;height:100vh;overflow:hidden;user-select:none}

/* ══ LOADER ══ */
#loader{
  position:fixed;inset:0;background:#05050d;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;transition:opacity .6s ease;
}
#loader.fade{opacity:0;pointer-events:none}
.ld-logo{display:flex;align-items:center;gap:18px;margin-bottom:30px;animation:lp 2s ease-in-out infinite}
@keyframes lp{0%,100%{filter:drop-shadow(0 0 10px rgba(var(--a),.4))}50%{filter:drop-shadow(0 0 24px rgba(var(--a),.9))}}
.ld-k2{font-size:68px;font-weight:900;background:linear-gradient(135deg,#fff,rgb(var(--a)));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:3px}
.ld-sub{font-size:10px;color:rgba(var(--a),.5);letter-spacing:4px;text-transform:uppercase;margin-bottom:44px}
.prog-wrap{width:200px;height:2px;background:rgba(var(--a),.08);border-radius:1px;margin-bottom:10px;overflow:hidden}
.prog-bar{height:100%;width:0%;background:linear-gradient(90deg,rgba(var(--a),.4),rgb(var(--a)),#90c8ff);border-radius:1px;box-shadow:0 0 8px rgba(var(--a),.6);transition:width .15s linear}
.prog-lbl{font-size:9px;color:rgba(var(--a),.35);letter-spacing:2px;min-height:14px}

/* ══ MENU ══ */
#menu{
  display:none;position:fixed;top:50%;left:20px;
  transform:translateY(-50%);width:310px;
  animation:mIn .28s cubic-bezier(.22,.84,.36,1) both;
}
#menu.show{display:block}
@keyframes mIn{from{opacity:0;transform:translateY(-50%) translateX(-12px)}to{opacity:1;transform:translateY(-50%) translateX(0)}}
.mbox{
  background:rgba(7,7,14,.97);border:1px solid rgba(var(--a),.18);border-radius:2px;
  box-shadow:0 0 40px rgba(var(--a),.09),0 0 0 1px rgba(0,0,0,.5),0 22px 55px rgba(0,0,0,.92);
  overflow:hidden;
}

/* header */
.mhdr{
  padding:11px 13px 9px;
  background:linear-gradient(150deg,#0c0c20,#080815);
  border-bottom:2px solid rgb(var(--a));
  display:flex;align-items:center;gap:11px;position:relative;overflow:hidden;
}
.mhdr::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 50%,rgba(var(--a),.07),transparent 65%);pointer-events:none}
.hico svg{width:36px;height:36px;filter:drop-shadow(0 0 8px rgba(var(--a),.6))}
.hk2{font-size:24px;font-weight:900;background:linear-gradient(135deg,#fff,rgb(var(--a)));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 8px rgba(var(--a),.3));letter-spacing:2px}
.htag{font-size:8px;color:rgba(var(--a),.4);letter-spacing:2px;margin-top:1px}
.hkey{margin-left:auto;flex-shrink:0;background:rgba(var(--a),.1);border:1px solid rgba(var(--a),.22);border-radius:3px;padding:2px 7px;font-size:11px;font-weight:700;color:rgb(var(--a));letter-spacing:1px}

/* breadcrumb */
.sbar{background:#040410;padding:4px 10px;font-size:10px;color:rgba(255,255,255,.22);border-bottom:1px solid rgba(var(--a),.05);min-height:22px;display:flex;align-items:center;letter-spacing:.3px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.sbar b{color:rgba(var(--a),.45)}
.ss{margin:0 4px;opacity:.35}

/* items wrapper */
.mitems{position:relative;overflow:hidden}
.mscroll{position:absolute;left:0;top:0;bottom:0;width:7px;background:#020208;border-right:1px solid rgba(var(--a),.05);z-index:2}
.msthumb{position:absolute;left:1px;right:1px;background:rgba(var(--a),1);border-radius:1px;box-shadow:0 0 4px rgba(var(--a),.5);transition:top .1s,height .1s;min-height:10px}
.ilist{padding-left:7px}

/* category */
.mcat{padding:4px 11px 3px;font-size:8px;font-weight:700;color:rgba(var(--a),.45);letter-spacing:2px;text-transform:uppercase;background:#020208;border-bottom:1px solid rgba(var(--a),.04);position:relative}
.mcat::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:rgba(var(--a),.35)}

/* row */
.mrow{padding:0 11px;min-height:34px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.022);position:relative;gap:5px;transition:background .07s}
.mrow.sel{background:rgba(var(--a),.11)}
.mrow.sel::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:rgb(var(--a));box-shadow:0 0 5px rgba(var(--a),.5)}
.mrow.sel::after{content:'';position:absolute;right:0;top:0;bottom:0;width:2px;background:rgba(var(--a),.25)}
.rname{font-size:13.5px;font-weight:500;color:rgba(200,215,255,.82);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mrow.sel .rname{color:#fff;font-weight:600}
.rr{display:flex;align-items:center;gap:4px;flex-shrink:0}
.rarr{font-size:10px;color:rgba(var(--a),.45)}
.mrow.sel .rarr{color:rgb(var(--a))}

/* toggle */
.tpill{width:28px;height:13px;border-radius:7px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);position:relative;transition:.18s}
.tpill.on{background:rgba(var(--a),.22);border-color:rgb(var(--a));box-shadow:0 0 5px rgba(var(--a),.25)}
.tdot{position:absolute;top:2px;left:2px;width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.25);transition:.16s}
.tpill.on .tdot{left:17px;background:rgb(var(--a));box-shadow:0 0 4px rgba(var(--a),.5)}
.tlbl{font-size:8px;font-weight:700;color:rgba(255,255,255,.2);letter-spacing:.5px}
.tpill.on~.tlbl{color:rgb(var(--a))}

/* slider */
.slw{display:flex;flex-direction:column;align-items:flex-end;gap:1px;min-width:56px}
.slv{font-size:10.5px;font-weight:700;color:rgb(var(--a));letter-spacing:.5px}
.slb{width:56px;height:3px;background:rgba(var(--a),.1);border-radius:2px}
.slf{height:100%;background:rgb(var(--a));border-radius:2px;box-shadow:0 0 3px rgba(var(--a),.35);transition:width .07s}
.slh{font-size:7px;color:rgba(var(--a),.28);letter-spacing:.5px}

/* player */
.prow{padding:5px 11px;min-height:36px;display:flex;align-items:center;gap:7px;border-bottom:1px solid rgba(255,255,255,.02);position:relative}
.prow.sel{background:rgba(var(--a),.09)}
.prow.sel::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:rgb(var(--a));box-shadow:0 0 5px rgba(var(--a),.4)}
.pav{width:24px;height:24px;border-radius:5px;display:grid;place-items:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.pin{flex:1;min-width:0}
.pn{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.phb{height:2px;background:rgba(255,255,255,.06);border-radius:1px;margin-top:3px;overflow:hidden}
.phf{height:100%;border-radius:1px}
.pds{font-size:9px;color:rgba(255,255,255,.22);flex-shrink:0}

/* footer */
.mfoot{background:#030308;padding:4px 11px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(var(--a),.06)}
.fhint{font-size:8px;color:rgba(255,255,255,.16);letter-spacing:1px}
.fpg{font-size:9px;color:rgba(var(--a),.45);font-weight:600}

/* target bar */
.tbar{background:rgba(var(--a),.06);border-top:1px solid rgba(var(--a),.1);padding:3px 11px;font-size:9px;color:rgb(var(--a));letter-spacing:.5px;display:none;align-items:center;gap:5px}
.tbar.show{display:flex}

/* notification */
#notif{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:rgba(7,7,14,.96);border:1px solid rgba(var(--a),.28);border-radius:3px;padding:6px 16px;font-size:13px;font-weight:600;color:rgb(var(--a));letter-spacing:.4px;pointer-events:none;opacity:0;transition:opacity .18s;white-space:nowrap;box-shadow:0 0 18px rgba(var(--a),.12)}
#notif.show{opacity:1}

/* coords */
#chud{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:600;color:rgba(var(--a),.45);letter-spacing:1px;display:none;font-family:'Rajdhani',sans-serif}
#chud.show{display:block}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="ld-logo">
    <svg width="64" height="64" viewBox="0 0 100 100" fill="none">
      <defs>
        <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="rgb(26,107,255)"/><stop offset="100%" stop-color="#90c8ff"/></linearGradient>
        <filter id="gf"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <polygon points="50,4 93,27 93,73 50,96 7,73 7,27" fill="none" stroke="rgba(26,107,255,.15)" stroke-width="1.5"/>
      <polygon points="50,14 83,32 83,68 50,86 17,68 17,32" fill="rgba(26,107,255,.04)" stroke="url(#g1)" stroke-width="1"/>
      <line x1="28" y1="30" x2="28" y2="70" stroke="url(#g1)" stroke-width="7" stroke-linecap="round" filter="url(#gf)"/>
      <line x1="28" y1="50" x2="50" y2="30" stroke="url(#g1)" stroke-width="7" stroke-linecap="round" filter="url(#gf)"/>
      <line x1="28" y1="50" x2="50" y2="70" stroke="url(#g1)" stroke-width="7" stroke-linecap="round" filter="url(#gf)"/>
      <path d="M58 32 Q70 28 72 38 Q74 47 60 55 L58 57 L74 57 L74 62 L56 62 L56 57 Q68 50 70 41 Q71 35 65 33 Q60 32 58 37" fill="url(#g1)" filter="url(#gf)"/>
    </svg>
    <div class="ld-k2">K2</div>
  </div>
  <div class="ld-sub">FiveM Mod Menu &nbsp;•&nbsp; Phaze Style &nbsp;•&nbsp; v6.0</div>
  <div class="prog-wrap"><div class="prog-bar" id="pb"></div></div>
  <div class="prog-lbl" id="pl">Initializing...</div>
</div>

<!-- MENU -->
<div id="menu">
<div class="mbox">
  <div class="mhdr">
    <div class="hico">
      <svg viewBox="0 0 100 100" fill="none">
        <defs><linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="rgb(var(--a))"/><stop offset="100%" stop-color="#90c8ff"/></linearGradient></defs>
        <polygon points="50,4 93,27 93,73 50,96 7,73 7,27" fill="none" stroke="rgba(var(--a),.2)" stroke-width="1.5"/>
        <line x1="28" y1="30" x2="28" y2="70" stroke="url(#g2)" stroke-width="7" stroke-linecap="round"/>
        <line x1="28" y1="50" x2="50" y2="30" stroke="url(#g2)" stroke-width="7" stroke-linecap="round"/>
        <line x1="28" y1="50" x2="50" y2="70" stroke="url(#g2)" stroke-width="7" stroke-linecap="round"/>
        <path d="M58 32 Q70 28 72 38 Q74 47 60 55 L58 57 L74 57 L74 62 L56 62 L56 57 Q68 50 70 41 Q71 35 65 33 Q60 32 58 37" fill="url(#g2)"/>
      </svg>
    </div>
    <div><div class="hk2">K2 MENU</div><div class="htag">PHAZE STYLE &nbsp;•&nbsp; v6.0</div></div>
    <div class="hkey" id="hkey">/</div>
  </div>
  <div class="sbar" id="sbar">Main menu</div>
  <div class="mitems" id="mitems">
    <div class="mscroll"><div class="msthumb" id="sbt"></div></div>
    <div class="ilist" id="ilist"></div>
  </div>
  <div class="tbar" id="tbar"></div>
  <div class="mfoot">
    <span class="fhint">↑↓ Nav &nbsp;•&nbsp; ←→ Slider &nbsp;•&nbsp; ENTER &nbsp;•&nbsp; BACK</span>
    <span class="fpg" id="fpg">1/1</span>
  </div>
</div>
</div>

<div id="notif"></div>
<div id="chud"></div>

<script>
// ── LOADER 5s ──
const STEPS=[
  [12,'Loading core modules...'],
  [28,'Connecting to FiveM...'],
  [44,'Fetching player data...'],
  [60,'Loading vehicle list...'],
  [74,'Building menu tree...'],
  [86,'Applying Phaze theme...'],
  [95,'Almost ready...'],
  [100,'Done!']
];
let si=0;
function runL(){
  if(si>=STEPS.length){
    setTimeout(()=>{
      const ld=document.getElementById('loader');
      ld.classList.add('fade');
      setTimeout(()=>ld.style.display='none',620);
    },300);
    return;
  }
  const [p,l]=STEPS[si++];
  document.getElementById('pb').style.width=p+'%';
  document.getElementById('pl').textContent=l;
  setTimeout(runL,5000/STEPS.length);
}
setTimeout(runL,200);

// ── THEME ──
function setTheme(r,g,b){document.documentElement.style.setProperty('--a',`${r},${g},${b}`);}

// ── RENDER ──
function render(s){
  if(!s) return;
  const menu=document.getElementById('menu');
  if(!s.visible){menu.classList.remove('show');return;}
  menu.classList.add('show');

  if(s.theme) setTheme(s.theme.r,s.theme.g,s.theme.b);
  if(s.keybind) document.getElementById('hkey').textContent=s.keybind;

  // breadcrumb
  const sb=document.getElementById('sbar');
  sb.innerHTML='';
  if(s.breadcrumb){
    s.breadcrumb.forEach((c,i)=>{
      const sp=document.createElement('span');
      sp.textContent=c;
      if(i===s.breadcrumb.length-1) sp.style.color='rgba(200,215,255,.7)';
      sb.appendChild(sp);
      if(i<s.breadcrumb.length-1){const sep=document.createElement('span');sep.className='ss';sep.textContent=' › ';sb.appendChild(sep);}
    });
  }

  // items
  const el=document.getElementById('ilist');
  el.innerHTML='';
  const items=s.items||[];
  items.forEach(item=>{
    if(item.type==='cat'){
      const d=document.createElement('div');d.className='mcat';d.textContent=item.name;el.appendChild(d);return;
    }
    if(item.type==='player'){
      const d=document.createElement('div');d.className='prow'+(item.sel?' sel':'');
      const hc=item.hp>60?'#00ee88':item.hp>30?'#ffaa00':'#ff3355';
      const c=item.col||'rgba(26,107,255,.8)';
      d.innerHTML=`<div class="pav" style="background:${c}1a;border:1px solid ${c}33">${(item.name||'?')[0]}</div>
        <div class="pin"><div class="pn" style="color:${c}">${item.name}</div>
        <div class="phb"><div class="phf" style="width:${item.hp}%;background:${hc}"></div></div></div>
        <span class="pds">${item.dist}m</span>`;
      el.appendChild(d);return;
    }
    const d=document.createElement('div');d.className='mrow'+(item.sel?' sel':'');
    let rh='';
    if(item.right==='arrow') rh=`<div class="rr"><span class="rarr">»</span></div>`;
    else if(item.right==='toggle') rh=`<div class="rr"><div class="tpill${item.on?' on':''}"><div class="tdot"></div></div><span class="tlbl">${item.on?'ON':'OFF'}</span></div>`;
    else if(item.right==='slider') rh=`<div class="rr"><div class="slw"><span class="slv">${item.val}</span><div class="slb"><div class="slf" style="width:${Math.round((item.pct||0)*100)}%"></div></div><span class="slh">◄ ►</span></div></div>`;
    else if(item.right==='value') rh=`<div class="rr"><span style="font-size:10px;color:rgba(var(--a),.6);font-weight:600">${item.val}</span></div>`;
    else rh=`<div class="rr"><span class="rarr" style="opacity:.18">›</span></div>`;
    d.innerHTML=`<span class="rname">${item.name}</span>${rh}`;
    el.appendChild(d);
  });

  // scrollbar
  const mt=document.getElementById('mitems');
  const sbt=document.getElementById('sbt');
  const cH=mt.offsetHeight;
  const vis=Math.min(8,items.length);
  const off=s.scrollOff||0;
  const tH=Math.max(10,Math.round((vis/Math.max(items.length,1))*cH));
  const maxOff=Math.max(0,items.length-vis);
  const tTop=maxOff===0?0:(off/maxOff)*(cH-tH);
  sbt.style.height=tH+'px';sbt.style.top=tTop+'px';

  // page
  const nc=(items.filter(x=>x.type!=='cat')).length||1;
  document.getElementById('fpg').textContent=`${s.selIdx||1}/${nc}`;

  // target
  const tb=document.getElementById('tbar');
  if(s.target){tb.className='tbar show';tb.textContent='▶ TARGET: '+s.target;}
  else tb.className='tbar';

  // coords
  const ch=document.getElementById('chud');
  if(s.coords&&s.showCoords){ch.textContent=`X:${s.coords.x}  Y:${s.coords.y}  Z:${s.coords.z}`;ch.className='show';}
  else ch.className='';
}

// ── MESSAGES FROM LUA ──
let ntT;
window.addEventListener('message',e=>{
  const d=e.data;
  if(!d||!d.type) return;
  if(d.type==='update') render(d.state);
  if(d.type==='notify'){
    const el=document.getElementById('notif');
    el.textContent=d.msg;el.classList.add('show');
    clearTimeout(ntT);ntT=setTimeout(()=>el.classList.remove('show'),2200);
  }
  if(d.type==='hide') document.getElementById('menu').classList.remove('show');
});
</script>
</body>
</html>
