<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100vw;height:100vh;overflow:hidden;background:transparent;
  font-family:'Geist Mono','Consolas',monospace;font-size:11px;color:#b8b8cc;
  -webkit-font-smoothing:antialiased;}

#menu{position:fixed;top:10px;left:10px;z-index:200;
  opacity:0;pointer-events:none;transition:opacity .12s ease;}
#menu.open{opacity:1;pointer-events:all;}

.panel{
  width:280px;
  background:rgba(10,10,18,0.94);
  border:1px solid rgba(120,90,220,0.12);
  border-radius:3px;
  box-shadow:0 4px 24px rgba(0,0,0,0.7),0 0 1px rgba(120,90,220,0.2);
  display:flex;flex-direction:column;
  max-height:calc(100vh - 30px);
}

.hdr{
  padding:6px 8px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(120,90,220,0.1);
  background:rgba(120,90,220,0.04);
}
.hdr-name{font-size:10px;font-weight:700;color:#a78bfa;letter-spacing:1.5px;}
.hdr-v{font-size:8px;color:#444;margin-left:4px;}

.tabs{
  display:flex;overflow-x:auto;flex-shrink:0;
  border-bottom:1px solid rgba(120,90,220,0.08);
  background:rgba(0,0,0,0.15);
}
.tabs::-webkit-scrollbar{height:0;}
.tab{
  padding:5px 7px;font-size:8px;font-weight:600;
  color:#3a3a55;cursor:default;white-space:nowrap;
  border-bottom:2px solid transparent;
  transition:color .08s,border-color .08s;
  text-transform:uppercase;letter-spacing:0.8px;
}
.tab.on{color:#a78bfa;border-bottom-color:#a78bfa;}

.bread{
  padding:5px 8px 4px;font-size:8px;color:#555;
  border-bottom:1px solid rgba(120,90,220,0.06);
  display:flex;align-items:center;gap:4px;
}
.bread-tab{color:#a78bfa;}
.bread-sep{color:#333;}
.bread-cat{color:#777;}

.list{
  flex:1;overflow-y:auto;padding:2px 0;
  max-height:380px;min-height:60px;
}
.list::-webkit-scrollbar{width:2px;}
.list::-webkit-scrollbar-track{background:transparent;}
.list::-webkit-scrollbar-thumb{background:rgba(120,90,220,0.2);border-radius:1px;}

.row{
  display:flex;align-items:center;
  padding:4px 8px;min-height:22px;
  cursor:default;transition:background .05s;position:relative;
}
.row:hover{background:rgba(255,255,255,0.02);}
.row.on{background:rgba(120,90,220,0.12);}
.row.on::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:2px;background:#a78bfa;
  box-shadow:0 0 4px rgba(120,90,220,0.4);
}
.row-text{flex:1;font-size:10px;font-weight:500;color:#888;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row.on .row-text{color:#ccc;}
.row-right{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.row-arrow{font-size:9px;color:#333;}
.row.on .row-arrow{color:#a78bfa;}

.tog{width:6px;height:6px;border-radius:50%;background:#333;flex-shrink:0;}
.tog.on{background:#a78bfa;box-shadow:0 0 4px rgba(120,90,220,0.5);}

.ftr{
  padding:4px 8px;border-top:1px solid rgba(120,90,220,0.06);
  font-size:7px;color:#333;display:flex;justify-content:space-between;
  letter-spacing:0.5px;
}

#alerts{position:fixed;bottom:10px;left:10px;z-index:600;
  display:flex;flex-direction:column;gap:3px;width:220px;pointer-events:none;}
.alert{
  padding:4px 7px;font-size:8.5px;font-weight:500;color:#999;
  background:rgba(10,10,18,0.92);border:1px solid rgba(120,90,220,0.08);
  border-radius:3px;position:relative;
  animation:aIn .15s ease both;
}
.alert::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;border-radius:1px 0 0 1px;}
.alert.ok::before{background:#22c55e;}
.alert.warn::before{background:#eab308;}
.alert.err::before{background:#ef4444;}
.alert.info::before{background:#a78bfa;}
@keyframes aIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes aOut{to{opacity:0;height:0;padding:0;margin:0;border:0;overflow:hidden}}
.alert.out{animation:aOut .15s ease forwards;}
</style>
</head>
<body>
<div id="alerts"></div>
<div id="menu">
<div class="panel">
  <div class="hdr">
    <span><span class="hdr-name">K2 MENU</span><span class="hdr-v">v6</span></span>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="bread" id="bread">
    <span class="bread-tab" id="b-tab">-</span>
    <span class="bread-sep">›</span>
    <span class="bread-cat" id="b-cat">-</span>
  </div>
  <div class="list" id="list"></div>
  <div class="ftr">
    <span>↑↓ Nav</span>
    <span>←→ Tabs</span>
    <span>ENTER Select</span>
    <span>BKSP Back</span>
  </div>
</div>
</div>

<script>
let aid=0;
function addAlert(text,type){
  const p=document.getElementById('alerts');
  const id=++aid;
  const el=document.createElement('div');
  el.className='alert '+(type||'info');
  el.id='a'+id;
  el.textContent=text;
  if(p.children.length>=3)p.lastChild.remove();
  p.insertBefore(el,p.firstChild);
  setTimeout(()=>{const e=document.getElementById('a'+id);if(e){e.classList.add('out');setTimeout(()=>e.remove(),160);}},3500);
}

let togStates={};
const menuEl=document.getElementById('menu');

function renderSync(d){
  const tabsEl=document.getElementById('tabs');
  tabsEl.innerHTML='';
  (d.tabs||[]).forEach((name,i)=>{
    const t=document.createElement('div');
    t.className='tab'+((i+1)===d.tabIdx?' on':'');
    t.textContent=name;
    tabsEl.appendChild(t);
  });
  const at=tabsEl.querySelector('.tab.on');
  if(at)at.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});

  document.getElementById('b-tab').textContent=d.tabName||'';
  document.getElementById('b-cat').textContent=d.level==='items'?(d.catName||''):'Categories';

  const listEl=document.getElementById('list');
  listEl.innerHTML='';

  if(d.level==='tabs'){
    (d.cats||[]).forEach((name,i)=>{
      const row=document.createElement('div');
      row.className='row'+((i+1)===d.catIdx?' on':'');
      row.innerHTML='<span class="row-text">'+name+'</span><span class="row-right"><span class="row-arrow">›</span></span>';
      listEl.appendChild(row);
    });
  } else if(d.level==='items'){
    (d.items||[]).forEach((item,i)=>{
      const row=document.createElement('div');
      row.className='row'+((i+1)===d.itemIdx?' on':'');
      let right='';
      if(item.tog){
        const on=togStates[item.a]||false;
        right='<span class="tog'+(on?' on':'')+'"></span>';
      }
      row.innerHTML='<span class="row-text">'+item.n+'</span><span class="row-right">'+right+'</span>';
      listEl.appendChild(row);
    });
  }

  const sel=listEl.querySelector('.row.on');
  if(sel)sel.scrollIntoView({block:'nearest',behavior:'smooth'});
}

window.addEventListener('message',function(e){
  const d=e.data;
  if(!d||!d.type)return;
  switch(d.type){
    case 'toggle':
      if(d.show)menuEl.classList.add('open');
      else menuEl.classList.remove('open');
      break;
    case 'sync':
      renderSync(d);
      break;
    case 'notify':
      addAlert(d.text,d.color||'info');
      break;
    case 'toggle_state':
      if(d.key!=null){
        togStates['toggle:'+d.key]=d.value;
      }
      break;
  }
});

addAlert('K2 MENU v6.0 LOADED','ok');
setTimeout(()=>addAlert('Press F9 to open','info'),800);
</script>
</body>
</html>
