<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100vw;height:100vh;overflow:hidden;background:transparent;
  font-family:'Inter',sans-serif;font-size:12px;color:#ccc;
  -webkit-font-smoothing:antialiased;}
#menu{position:fixed;top:0;left:0;z-index:200;opacity:0;pointer-events:none;
  transition:opacity .15s ease;padding:8px;}
#menu.open{opacity:1;pointer-events:all;}
.panel{width:310px;background:rgba(8,8,14,0.92);border:1px solid rgba(255,255,255,0.06);
  border-radius:4px;backdrop-filter:blur(8px);box-shadow:0 8px 32px rgba(0,0,0,0.6);
  display:flex;flex-direction:column;max-height:calc(100vh - 80px);overflow:hidden;}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 10px 6px;
  border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);}
.hdr-left{display:flex;align-items:center;gap:6px;}
.hdr-logo{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:#a78bfa;letter-spacing:1px;}
.hdr-ver{font-size:9px;color:#555;font-family:'JetBrains Mono',monospace;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.hdr-info{font-size:8.5px;color:#444;font-family:'JetBrains Mono',monospace;}
.tabs{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,0.06);overflow-x:auto;flex-shrink:0;background:rgba(255,255,255,0.01);}
.tabs::-webkit-scrollbar{height:0;}
.tab{padding:6px 9px;font-size:9px;font-weight:600;color:#555;cursor:pointer;white-space:nowrap;
  border-bottom:2px solid transparent;transition:all .1s;flex-shrink:0;text-transform:uppercase;letter-spacing:0.5px;}
.tab:hover{color:#888;background:rgba(255,255,255,0.02);}
.tab.on{color:#a78bfa;border-bottom-color:#a78bfa;background:rgba(167,139,250,0.05);}
.sub-hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 10px 5px;
  border-bottom:1px solid rgba(255,255,255,0.04);background:rgba(167,139,250,0.04);flex-shrink:0;}
.sub-title{font-size:10px;font-weight:700;color:#a78bfa;letter-spacing:0.5px;}
.sub-back{font-size:9px;color:#666;cursor:pointer;padding:2px 6px;border-radius:3px;transition:all .1s;display:none;}
.sub-back:hover{color:#a78bfa;background:rgba(167,139,250,0.1);}
.sub-back.show{display:block;}
.list{flex:1;overflow-y:auto;padding:2px 0;min-height:100px;max-height:420px;}
.list::-webkit-scrollbar{width:3px;}
.list::-webkit-scrollbar-track{background:transparent;}
.list::-webkit-scrollbar-thumb{background:rgba(167,139,250,0.2);border-radius:2px;}
.li{display:flex;align-items:center;gap:8px;padding:5px 10px;cursor:pointer;transition:background .06s;position:relative;min-height:26px;}
.li:hover{background:rgba(255,255,255,0.03);}
.li.on{background:rgba(167,139,250,0.12);}
.li.on::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:#a78bfa;}
.li-icon{font-size:12px;width:16px;text-align:center;flex-shrink:0;opacity:.7;}
.li-text{flex:1;font-size:11px;font-weight:500;color:#bbb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.li.on .li-text{color:#ddd;}
.li-right{font-size:9px;color:#555;flex-shrink:0;display:flex;align-items:center;gap:4px;}
.li-arrow{color:#444;font-size:10px;}
.li-badge{font-size:7.5px;font-weight:700;padding:1px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;letter-spacing:0.3px;}
.b-purple{background:rgba(167,139,250,0.15);color:#a78bfa;}
.b-red{background:rgba(239,68,68,0.12);color:#f87171;}
.b-green{background:rgba(34,197,94,0.12);color:#4ade80;}
.b-yellow{background:rgba(234,179,8,0.12);color:#facc15;}
.b-orange{background:rgba(249,115,22,0.12);color:#fb923c;}
.b-gray{background:rgba(107,114,128,0.12);color:#9ca3af;}
.sw{width:24px;height:12px;border-radius:6px;background:rgba(255,255,255,0.08);position:relative;cursor:pointer;transition:all .2s;flex-shrink:0;}
.sw::after{content:'';position:absolute;top:1.5px;left:1.5px;width:9px;height:9px;border-radius:50%;background:#555;transition:all .2s;}
.sw.on{background:#a78bfa;}
.sw.on::after{left:12.5px;background:#fff;}
.sec-lbl{font-size:8px;font-weight:700;letter-spacing:2px;color:rgba(167,139,250,0.4);padding:8px 10px 3px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;}
.ftr{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;
  border-top:1px solid rgba(255,255,255,0.04);background:rgba(255,255,255,0.01);flex-shrink:0;}
.ftr-text{font-size:8px;color:#444;font-family:'JetBrains Mono',monospace;}
.ftr-keys{display:flex;gap:6px;}
.ftr-key{font-size:7.5px;color:#555;font-family:'JetBrains Mono',monospace;background:rgba(255,255,255,0.04);padding:1px 5px;border-radius:2px;}
#alerts{position:fixed;bottom:12px;left:8px;z-index:600;display:flex;flex-direction:column;gap:4px;width:240px;pointer-events:none;}
.alert{display:flex;align-items:center;gap:6px;padding:5px 8px;background:rgba(8,8,14,0.92);border:1px solid rgba(255,255,255,0.06);border-radius:4px;backdrop-filter:blur(8px);animation:aIn .2s ease both;overflow:hidden;position:relative;}
.alert::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;}
.alert.ok::before{background:#22c55e;}.alert.warn::before{background:#eab308;}.alert.err::before{background:#ef4444;}.alert.troll::before{background:#f97316;}.alert.info::before{background:#a78bfa;}
.a-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.a-text{flex:1;font-size:9px;font-weight:500;font-family:'JetBrains Mono',monospace;color:#aaa;}
@keyframes aIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes aOut{to{opacity:0;transform:translateY(8px);height:0;padding:0;margin:0;border:0}}
.alert.out{animation:aOut .2s ease forwards;}
#hud{position:fixed;bottom:60px;left:8px;z-index:300;display:none;background:rgba(8,8,14,0.88);border:1px solid rgba(255,255,255,0.06);border-radius:4px;padding:6px 10px;backdrop-filter:blur(8px);}
#hud.show{display:block;}
.hud-row{display:flex;align-items:center;gap:8px;margin:1px 0;}
.hud-lbl{font-size:8px;font-weight:700;color:#555;width:36px;font-family:'JetBrains Mono',monospace;letter-spacing:0.5px;}
.hud-val{font-size:9px;font-weight:600;color:#a78bfa;font-family:'JetBrains Mono',monospace;}
.hud-feats{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px;}
.hud-feat{font-size:7px;font-weight:700;padding:1px 4px;border-radius:2px;background:rgba(167,139,250,0.12);color:#a78bfa;font-family:'JetBrains Mono',monospace;}
</style>
</head>
<body>
<div id="alerts"></div>
<div id="hud">
  <div class="hud-row"><span class="hud-lbl">HP</span><span class="hud-val" id="hud-hp">200</span></div>
  <div class="hud-row"><span class="hud-lbl">ARMOR</span><span class="hud-val" id="hud-armor">0</span></div>
  <div class="hud-row"><span class="hud-lbl">SPEED</span><span class="hud-val" id="hud-speed">0</span></div>
  <div class="hud-feats" id="hud-feats"></div>
</div>
<div id="menu">
<div class="panel">

  <div class="tabs" id="tabs"></div>
  <div class="sub-hdr"><div class="sub-title" id="sub-title">Vehicle</div><div class="sub-back" id="sub-back" onclick="goBack()">‹ BACK</div></div>

</div>
</div>

let curSection='vehicle',curCat=null,togStates={},selIdx=0;
const menuEl=document.getElementById('menu');

function buildTabs(){
  const el=document.getElementById('tabs');el.innerHTML='';
  Object.keys(SECTIONS).forEach(k=>{
    const t=document.createElement('div');t.className='tab'+(k===curSection?' on':'');t.textContent=SECTIONS[k].name;
    t.onclick=()=>{curSection=k;curCat=null;selIdx=0;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');showCats();};
    el.appendChild(t);
  });
}

function showCats(){
  const sec=SECTIONS[curSection];if(!sec)return;curCat=null;
  document.getElementById('sub-title').textContent=sec.name;
  document.getElementById('sub-back').classList.remove('show');
  document.getElementById('hdr-count').textContent=sec.cats.length+' items';
  const el=document.getElementById('list');el.innerHTML='';
  sec.cats.forEach((cat,i)=>{
    const d=document.createElement('div');d.className='li'+(i===0?' on':'');
    d.innerHTML='<div class="li-icon">'+cat.ic+'</div><div class="li-text">'+cat.n+'</div><div class="li-right"><span class="li-arrow">›</span></div>';
    d.onclick=()=>{curCat=cat.k;selIdx=0;showItems(cat.k,cat.n);};
    el.appendChild(d);
  });selIdx=0;
}

function showItems(key,name){
  const items=ITEMS[key];if(!items)return;
  document.getElementById('sub-title').textContent=name||key;
  document.getElementById('sub-back').classList.add('show');
  document.getElementById('hdr-count').textContent=items.filter(x=>!x.sep).length+' items';
  const el=document.getElementById('list');el.innerHTML='';
  let realIdx=0;
  items.forEach((item)=>{
    if(item.sep){const s=document.createElement('div');s.className='sec-lbl';s.textContent=item.n.replace(/[─ ]/g,'').trim()||item.n;el.appendChild(s);return;}
    const d=document.createElement('div');d.className='li'+(realIdx===0?' on':'');
    let right='';
    if(item.tog){const on=togStates[item.a]||false;right='<div class="sw'+(on?' on':'')+'" data-action="'+item.a+'"></div>';}
    else if(item.b){right='<span class="li-badge '+(item.bc||'b-purple')+'">'+item.b+'</span>';}
    d.innerHTML='<div class="li-text">'+item.n+'</div><div class="li-right">'+right+'</div>';
    d.onclick=()=>{document.querySelectorAll('.li').forEach(x=>x.classList.remove('on'));d.classList.add('on');execAction(item);};
    el.appendChild(d);realIdx++;
  });
}

function goBack(){curCat=null;selIdx=0;showCats();}

function execAction(item){
  if(!item||!item.a)return;
  if(item.tog||item.a.startsWith('toggle:')){
    togStates[item.a]=!togStates[item.a];const on=togStates[item.a];
    document.querySelectorAll('[data-action="'+item.a+'"]').forEach(sw=>sw.classList.toggle('on',on));
    addAlert((on?'ON ':'OFF ')+item.a.replace('toggle:',''),on?'ok':'warn');
  } else {addAlert('Executed: '+item.n,'info');}
  sendLua({type:'action',action:item.a});
}
function sendLua(data){}

let navIdx=0;
window.addEventListener('message',function(e){
  const d=e.data;if(!d||!d.type)return;
  switch(d.type){
    case 'toggle':if(d.show)menuEl.classList.add('open');else menuEl.classList.remove('open');break;
    case 'notify':addAlert(d.text,d.color||'info');break;
    case 'toggle_state':if(d.key!=null){togStates['toggle:'+d.key]=d.value;document.querySelectorAll('[data-action="toggle:'+d.key+'"]').forEach(sw=>sw.classList.toggle('on',d.value));}break;
    case 'nav':handleNav(d);break;
    case 'update_hud':
      const hud=document.getElementById('hud');
      if(d.visible)hud.classList.add('show');else hud.classList.remove('show');
      if(d.hp!=null)document.getElementById('hud-hp').textContent=d.hp;
      if(d.armor!=null)document.getElementById('hud-armor').textContent=d.armor;
      if(d.speed!=null)document.getElementById('hud-speed').textContent=d.speed+' km/h';
      if(d.features){const fc=document.getElementById('hud-feats');fc.innerHTML='';d.features.forEach(f=>{const s=document.createElement('span');s.className='hud-feat';s.textContent=f;fc.appendChild(s);});}
      break;
  }
});

function handleNav(d){
  if(d.action==='switchNav'&&d.nav){
    const map={vehicle:'vehicle',self:'player',weapons:'weapons',teleport:'teleport',weather:'world',abilities:'pvp',esp:'esp',troll:'troll',anims:'anims',objects:'misc',carthrow:'misc',freecam:'misc',esx:'esx',qb:'qb',settings:'settings'};
    const sec=map[d.nav]||d.nav;if(SECTIONS[sec]){curSection=sec;curCat=null;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));document.querySelectorAll('.tab').forEach(t=>{if(t.textContent===SECTIONS[sec].name)t.classList.add('on');});showCats();}
  } else if(d.action==='selectCat'){
    const items=document.querySelectorAll('.li');items.forEach((c,i)=>c.classList.toggle('on',i===(d.catIdx-1)));
    if(d.catKey&&ITEMS[d.catKey]){curCat=d.catKey;showItems(d.catKey);}
  } else if(d.action==='enterSub'){
    if(d.catKey&&ITEMS[d.catKey]){curCat=d.catKey;showItems(d.catKey);}
  } else if(d.action==='selectItem'){
    const items=document.querySelectorAll('.li');if(!items.length)return;
    const idx=Math.max(0,Math.min((d.itemIdx||1)-1,items.length-1));
    items.forEach((it,i)=>{it.classList.toggle('on',i===idx);if(i===idx)it.scrollIntoView({block:'nearest',behavior:'smooth'});});
  } else if(d.action==='executeItem'){
    const items=document.querySelectorAll('.li');const idx=d.itemIdx>0?d.itemIdx-1:0;if(items[idx])items[idx].click();
  } else if(d.action==='goBack'){goBack();}
}

buildTabs();showCats();
addAlert('K2 MENU v5.0 — LOADED','ok');
setTimeout(()=>addAlert('Press F9 to toggle','info'),1000);
