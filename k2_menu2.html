<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --a:#4a9eff;--a2:#2563eb;
  --bg:#0c0e13;--bg1:#0f1117;--bg2:#13161e;--bg3:#181c26;--bg4:#1e2330;
  --sel:rgba(74,158,255,0.12);--border:rgba(255,255,255,0.055);
  --text:#cdd5f0;--muted:#3d4a6a;--dim:#0a0c10;
  --hdr:rgba(74,158,255,0.18);
  --ok:#00d97e;--warn:#f5a623;--err:#f45b5b;--troll:#ff8c00;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100vw;height:100vh;overflow:hidden;background:transparent;
  font-family:'Inter',sans-serif;font-size:10px;color:var(--text);
  -webkit-font-smoothing:antialiased;}

/* SNOW */
#snow{position:fixed;inset:0;pointer-events:none;z-index:0;}

/* ALERTS */
#alerts{position:fixed;top:12px;left:12px;z-index:500;
  display:flex;flex-direction:column;gap:4px;width:210px;pointer-events:none;}
.alert{
  display:flex;align-items:center;gap:7px;padding:5px 9px;
  background:rgba(12,14,19,0.97);border:1px solid var(--border);
  border-radius:4px;backdrop-filter:blur(10px);position:relative;
  animation:aIn .22s cubic-bezier(.16,1,.3,1) both;overflow:hidden;
}
.alert::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;}
.alert.ok::before{background:var(--ok);}
.alert.warn::before{background:var(--warn);}
.alert.err::before{background:var(--err);}
.alert.troll::before{background:var(--troll);}
.alert.info::before{background:var(--a);}
.a-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.a-text{flex:1;font-size:8.5px;font-weight:500;font-family:'JetBrains Mono',monospace;color:var(--text);}
@keyframes aIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:none}}
@keyframes aOut{to{opacity:0;transform:translateX(-12px);height:0;padding:0;margin:0;border:0}}
.alert.out{animation:aOut .2s ease forwards;}

/* MENU */
#menu{position:fixed;inset:0;pointer-events:none;z-index:200;opacity:0;transition:opacity .18s ease;}
#menu.open{opacity:1;pointer-events:all;}

/* SHELL */
.shell{
  position:absolute;top:16px;left:16px;
  display:flex;height:calc(100vh - 52px);max-height:580px;
  border:1px solid var(--border);border-radius:6px;overflow:hidden;
  box-shadow:0 0 0 1px rgba(74,158,255,0.04),0 24px 80px rgba(0,0,0,0.95);
  animation:shellIn .28s cubic-bezier(.16,1,.3,1) both;
}
@keyframes shellIn{from{opacity:0;transform:translateY(14px) scale(.985)}to{opacity:1;transform:none}}

/* COL 1 — RAIL */
.rail{
  width:38px;background:var(--bg1);border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;
  padding:8px 0 6px;gap:1px;flex-shrink:0;
}
.rail-logo{font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:700;
  color:var(--a);letter-spacing:1.5px;margin-bottom:7px;padding-bottom:6px;
  width:100%;text-align:center;border-bottom:1px solid var(--border);}
.ri{width:26px;height:26px;border-radius:4px;display:flex;align-items:center;
  justify-content:center;font-size:12px;cursor:pointer;color:var(--muted);
  transition:all .12s;position:relative;flex-shrink:0;}
.ri:hover{background:var(--bg3);color:var(--text);}
.ri.on{background:var(--sel);color:var(--a);}
.ri.on::before{content:'';position:absolute;left:-1px;top:50%;transform:translateY(-50%);
  width:2px;height:13px;background:var(--a);border-radius:0 2px 2px 0;box-shadow:0 0 5px var(--a);}
.ri-tip{position:absolute;left:32px;background:var(--bg3);border:1px solid var(--border);
  color:var(--text);font-size:8px;font-weight:600;padding:2px 7px;border-radius:3px;
  white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .1s;z-index:99;
  font-family:'JetBrains Mono',monospace;letter-spacing:.5px;}
.ri:hover .ri-tip{opacity:1;}
.rsep{width:20px;height:1px;background:var(--border);margin:3px 0;}
.ri-bot{margin-top:auto;}
.sdot{position:absolute;top:2px;right:2px;width:4px;height:4px;border-radius:50%;
  background:var(--ok);box-shadow:0 0 4px var(--ok);}
.sdot.qb{background:var(--warn);box-shadow:0 0 4px var(--warn);}

/* COL 2 — CATS */
.cat{width:140px;background:var(--bg1);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;}
.cat-hdr{padding:7px 9px 6px;border-bottom:1px solid var(--border);
  background:var(--hdr);flex-shrink:0;}
.cat-lbl{font-size:6.5px;font-weight:700;letter-spacing:2.5px;
  color:rgba(74,158,255,.6);text-transform:uppercase;margin-bottom:2px;}
.cat-name{font-size:11px;font-weight:700;color:#fff;letter-spacing:-.3px;}
.cat-body{flex:1;overflow-y:auto;padding:3px 0;}
.cat-body::-webkit-scrollbar{width:2px;}
.cat-body::-webkit-scrollbar-thumb{background:var(--bg4);}
.ci{display:flex;align-items:center;gap:6px;padding:5px 9px;cursor:pointer;
  transition:background .08s;position:relative;border-bottom:1px solid rgba(255,255,255,.02);}
.ci:hover,.ci.on{background:var(--sel);}
.ci.on::after{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--a);}
.ci-ic{font-size:10px;width:13px;text-align:center;flex-shrink:0;opacity:.8;}
.ci-n{font-size:10px;font-weight:400;color:var(--muted);transition:color .08s;}
.ci:hover .ci-n,.ci.on .ci-n{color:var(--text);}
.ci-arr{margin-left:auto;font-size:8px;color:var(--muted);}
.ci:hover .ci-arr,.ci.on .ci-arr{color:var(--a);}

/* COL 3 — ITEMS */
.items{width:178px;background:var(--bg);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.items-hdr{padding:6px 9px 5px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:5px;background:var(--bg2);flex-shrink:0;}
.items-back{width:15px;height:15px;border-radius:3px;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:10px;color:var(--muted);transition:all .1s;flex-shrink:0;}
.items-back:hover{color:var(--text);background:var(--bg4);}
.items-title{font-size:10px;font-weight:600;color:var(--text);overflow:hidden;
  white-space:nowrap;text-overflow:ellipsis;}
.items-body{flex:1;overflow-y:auto;padding:3px 0;}
.items-body::-webkit-scrollbar{width:2px;}
.items-body::-webkit-scrollbar-thumb{background:var(--bg4);}
.sec-lbl{font-size:6.5px;font-weight:700;letter-spacing:2px;color:var(--muted);
  text-transform:uppercase;padding:7px 9px 3px;}
.li{display:flex;align-items:center;justify-content:space-between;padding:4.5px 9px;
  cursor:pointer;transition:background .08s;position:relative;
  border-bottom:1px solid rgba(255,255,255,.02);}
.li:hover,.li.on{background:var(--sel);}
.li.on::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--a);}
.li-l{display:flex;align-items:center;gap:5px;min-width:0;}
.li-n{font-size:9.5px;font-weight:400;color:var(--muted);transition:color .08s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.li:hover .li-n,.li.on .li-n{color:var(--text);}
.badge{font-size:7px;font-weight:700;font-family:'JetBrains Mono',monospace;
  padding:1px 4px;border-radius:2px;letter-spacing:.3px;flex-shrink:0;}
.bc{background:rgba(74,158,255,.13);color:#4a9eff;}
.bg2{background:rgba(0,217,126,.1);color:#00d97e;}
.bo{background:rgba(245,166,35,.1);color:#f5a623;}
.br{background:rgba(244,91,91,.12);color:#f45b5b;}
.bp{background:rgba(168,85,247,.12);color:#a855f7;}
.bor{background:rgba(255,140,0,.1);color:#ff8c00;}
.bgr{background:rgba(255,255,255,.05);color:#4a5068;}
.li-arr{font-size:8px;color:var(--muted);flex-shrink:0;}
.li:hover .li-arr,.li.on .li-arr{color:var(--a);}
/* TOGGLE */
.sw{width:24px;height:12px;border-radius:6px;background:var(--bg4);
  border:1px solid var(--border);position:relative;cursor:pointer;
  transition:all .18s;flex-shrink:0;}
.sw.on{background:rgba(74,158,255,.28);border-color:rgba(74,158,255,.4);}
.sw::after{content:'';position:absolute;top:2px;left:2px;width:8px;height:8px;
  border-radius:50%;background:var(--muted);transition:all .18s;}
.sw.on::after{left:14px;background:var(--a);box-shadow:0 0 4px var(--a);}

/* COL 4 — PREVIEW */
.preview{flex:1;min-width:155px;background:var(--bg1);display:flex;flex-direction:column;overflow:hidden;}
.prev-hdr{padding:6px 10px 5px;border-bottom:1px solid var(--border);
  background:var(--bg2);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.prev-name{font-size:10px;font-weight:700;color:var(--text);letter-spacing:-.2px;}
.prev-tag{font-size:7px;font-weight:700;font-family:'JetBrains Mono',monospace;
  color:var(--a);background:rgba(74,158,255,.1);border:1px solid rgba(74,158,255,.18);
  padding:1px 5px;border-radius:2px;letter-spacing:.8px;}
.prev-body{flex:1;padding:10px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;}
.prev-body::-webkit-scrollbar{width:2px;}
.prev-body::-webkit-scrollbar-thumb{background:var(--bg4);}

/* vehicle card */
.vcard{background:var(--bg2);border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.vimg{height:76px;background:linear-gradient(160deg,var(--bg3),var(--bg));
  display:flex;align-items:center;justify-content:center;position:relative;}
.vimg::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:70px;height:16px;background:radial-gradient(ellipse,rgba(74,158,255,.1),transparent 70%);}
.vem{font-size:38px;animation:fl 3s ease-in-out infinite;filter:drop-shadow(0 4px 12px rgba(74,158,255,.15));}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.vinf{padding:7px 9px;}
.vname{font-size:10px;font-weight:700;color:var(--text);}
.vmeta{font-size:7.5px;color:var(--muted);margin:1px 0 6px;text-transform:uppercase;letter-spacing:.5px;}
.stat{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.sl{font-size:7px;font-weight:600;color:var(--muted);width:36px;text-transform:uppercase;letter-spacing:.5px;}
.sb{flex:1;height:2px;background:var(--bg);border-radius:1px;overflow:hidden;}
.sf{height:100%;border-radius:1px;background:linear-gradient(90deg,var(--a2),var(--a));transition:width .35s ease;}
.sv{font-size:7.5px;font-family:'JetBrains Mono',monospace;color:var(--muted);width:16px;text-align:right;}
.spbtn{padding:5px;width:100%;background:rgba(74,158,255,.07);border:1px solid rgba(74,158,255,.18);
  border-radius:3px;font-size:8.5px;font-weight:700;color:var(--a);cursor:pointer;
  text-align:center;font-family:'JetBrains Mono',monospace;letter-spacing:1.5px;transition:all .12s;}
.spbtn:hover{background:rgba(74,158,255,.14);border-color:rgba(74,158,255,.3);}

/* info card */
.icard{text-align:center;display:flex;flex-direction:column;align-items:center;gap:5px;padding:4px 0;}
.ic-icon{font-size:28px;opacity:.45;line-height:1;}
.ic-name{font-size:10px;font-weight:700;color:var(--text);}
.ic-sub{font-size:8px;color:var(--muted);}
.ic-btn{padding:5px 14px;background:rgba(74,158,255,.07);border:1px solid rgba(74,158,255,.18);
  border-radius:3px;font-size:8.5px;font-weight:700;color:var(--a);cursor:pointer;
  font-family:'JetBrains Mono',monospace;letter-spacing:.8px;transition:all .12s;}
.ic-btn:hover{background:rgba(74,158,255,.14);}

/* toggles grid */
.tgrid{display:flex;flex-direction:column;gap:3px;width:100%;}
.trow{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;
  background:var(--bg2);border:1px solid var(--border);border-radius:3px;}
.tn{font-size:9.5px;font-weight:500;color:var(--muted);}

/* info rows */
.srow{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;
  background:var(--bg2);border:1px solid var(--border);border-radius:3px;margin-bottom:3px;}
.srow-l{font-size:9px;color:var(--muted);}
.srow-v{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--a);}

/* keys bar */
.keys{position:fixed;bottom:0;left:0;right:0;height:22px;background:var(--bg1);
  border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  gap:18px;opacity:0;transition:opacity .18s;z-index:300;pointer-events:none;}
#menu.open ~ .keys{opacity:1;}
.kk{display:flex;align-items:center;gap:4px;font-size:7.5px;color:var(--muted);
  font-family:'JetBrains Mono',monospace;}
.kk kbd{background:var(--bg3);border:1px solid var(--border);border-radius:2px;
  padding:0 5px;font-size:7.5px;color:var(--text);font-family:'JetBrains Mono',monospace;}

/* SMOOTH SLIDE */
.sld{animation:sld .14s cubic-bezier(.16,1,.3,1) both;}
@keyframes sld{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:none}}
.sld-up{animation:sldup .14s cubic-bezier(.16,1,.3,1) both;}
@keyframes sldup{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<canvas id="snow"></canvas>
<div id="alerts"></div>

<div id="menu">
<div class="shell">

  <!-- RAIL -->
  <nav class="rail">
    <div class="rail-logo">K2</div>
    <div class="ri on" data-nav="vehicle" title="">🚗<span class="ri-tip">VEHICLE</span></div>
    <div class="ri" data-nav="self">❤️<span class="ri-tip">SELF</span></div>
    <div class="ri" data-nav="weapons">🔫<span class="ri-tip">WEAPONS</span></div>

    <div class="ri" data-nav="esp">👁️<span class="ri-tip">ESP</span></div>
    <div class="ri" data-nav="troll">😈<span class="ri-tip">TROLL</span></div>
    <div class="ri" data-nav="particles">✨<span class="ri-tip">PARTICLES</span></div>
    <div class="ri" data-nav="anims">🎭<span class="ri-tip">ANIMS</span></div>
    <div class="ri" data-nav="objects">📦<span class="ri-tip">OBJECTS</span></div>
    <div class="ri" data-nav="carthrow">🚀<span class="ri-tip">CAR THROW</span></div>
    <div class="ri" data-nav="freecam">🎥<span class="ri-tip">FREECAM</span></div>
    <div class="rsep"></div>
    <div class="ri" data-nav="esx">🟣<span class="ri-tip">ESX</span><span class="sdot"></span></div>
    <div class="ri" data-nav="qb">🟡<span class="ri-tip">QBCORE</span><span class="sdot qb"></span></div>
    <div class="ri" data-nav="triggers">⚡<span class="ri-tip">TRIGGERS</span></div>
    <div class="rsep"></div>
    <div class="ri ri-bot" data-nav="settings">⚙️<span class="ri-tip">SETTINGS</span></div>
  </nav>

  <!-- CATS -->
  <div class="cat">
    <div class="cat-hdr">
      <div class="cat-lbl" id="cat-lbl">CATEGORY</div>
      <div class="cat-name" id="cat-name">Vehicle</div>
    </div>
    <div class="cat-body" id="cat-body"></div>
  </div>

  <!-- ITEMS -->
  <div class="items">
    <div class="items-hdr">
      <div class="items-back" id="items-back">‹</div>
      <div class="items-title" id="items-title">—</div>
    </div>
    <div class="items-body" id="items-body"></div>
  </div>

  <!-- PREVIEW -->
  <div class="preview">
    <div class="prev-hdr">
      <div class="prev-name" id="prev-name">K2 Menu</div>
      <div class="prev-tag" id="prev-tag">READY</div>
    </div>
    <div class="prev-body" id="prev-body"></div>
  </div>

</div>
</div>

<div class="keys">
  <div class="kk"><kbd>↑↓</kbd>Navigate</div>
  <div class="kk"><kbd>←→</kbd>Section</div>
  <div class="kk"><kbd>ENTER</kbd>Execute</div>
  <div class="kk"><kbd>BACK</kbd>Return</div>
  <div class="kk"><kbd>F9</kbd>Toggle</div>
  <div class="kk"><kbd>F6</kbd>Close</div>
</div>

<script>
// ══ SNOW ══
const cv=document.getElementById('snow'),cx=cv.getContext('2d');
let W,H;
function rsz(){W=cv.width=innerWidth;H=cv.height=innerHeight;}rsz();
addEventListener('resize',rsz);
const fl=Array.from({length:65},()=>({
  x:Math.random()*1920,y:Math.random()*1080,
  r:Math.random()*1.4+.3,s:Math.random()*.35+.08,
  d:(Math.random()-.5)*.14,a:Math.random()*.2+.04
}));
(function loop(){
  cx.clearRect(0,0,W,H);
  fl.forEach(f=>{
    cx.beginPath();cx.arc(f.x,f.y,f.r,0,Math.PI*2);
    cx.fillStyle=`rgba(255,255,255,${f.a})`;cx.fill();
    f.y+=f.s;f.x+=f.d;
    if(f.y>H+4){f.y=-4;f.x=Math.random()*W;}
    if(f.x<0)f.x=W;if(f.x>W)f.x=0;
  });
  requestAnimationFrame(loop);
})();

// ══ ALERTS ══
let aid=0;
const ACOLORS={ok:'#00d97e',warn:'#f5a623',err:'#f45b5b',troll:'#ff8c00',info:'#4a9eff'};
function addAlert(text,type='info'){
  const p=document.getElementById('alerts');
  const id=++aid;
  const el=document.createElement('div');
  el.className=`alert ${type}`;el.id='a'+id;
  const c=ACOLORS[type]||ACOLORS.info;
  el.innerHTML=`<div class="a-dot" style="background:${c};box-shadow:0 0 5px ${c}40"></div><div class="a-text">${text}</div>`;
  if(p.children.length>=5) p.lastChild.remove();
  p.insertBefore(el,p.firstChild);
  setTimeout(()=>{const e=document.getElementById('a'+id);if(e){e.classList.add('out');setTimeout(()=>e.remove(),220);}},6000);
}

// ══ NAV DATA ══
const NAV={
  vehicle:{name:'Vehicle',lbl:'TRANSPORT',cats:[
    {ic:'🏎️',n:'Vanilla Vehicles',k:'vanilla'},
    {ic:'🚗',n:'Server Vehicles', k:'sveh'},
    {ic:'🔧',n:'Vehicle Mods',    k:'mods'},
    {ic:'🎨',n:'Paint & Neon',    k:'paint'},
    {ic:'🔄',n:'Fix & Repair',    k:'fix'},
    {ic:'🚁',n:'Aircraft',        k:'air'},
    {ic:'🏍️',n:'Motorcycles',     k:'moto'},
    {ic:'🛡️',n:'Vehicle God',     k:'vehgod'},
  ]},
  self:{name:'Self',lbl:'PLAYER',cats:[
    {ic:'❤️',n:'Health & Armor',  k:'p_health'},
    {ic:'🛡️',n:'God & Protect',   k:'p_god'},
    {ic:'⭐',n:'Wanted Level',    k:'p_wanted'},
    {ic:'🚀',n:'Noclip',          k:'p_noclip'},
    {ic:'👤',n:'Ped & Outfit',    k:'p_ped'},
    {ic:'🏃',n:'Movement',        k:'p_move'},
    {ic:'🎭',n:'Misc',            k:'p_misc'},
    {ic:'🔁',n:'Auto Loops',      k:'p_loops'},
  ]},
  weapons:{name:'Weapons',lbl:'ARSENAL',cats:[
    {ic:'🔫',n:'Handguns',        k:'w_hand'},
    {ic:'🔫',n:'SMGs',            k:'w_smg'},
    {ic:'🔫',n:'Rifles',          k:'w_rifles'},
    {ic:'🔭',n:'Sniper',          k:'w_sniper'},
    {ic:'💣',n:'Explosives',      k:'w_explo'},
    {ic:'🔪',n:'Melee',           k:'w_melee'},
    {ic:'📦',n:'Loadout Presets', k:'w_load'},
    {ic:'⚙️',n:'Weapon Extras',   k:'w_extra'},
    {ic:'📋',n:'All Weapons',     k:'w_all'},
  ]},
  teleport:{name:'Teleport',lbl:'MOVEMENT',cats:[
    {ic:'🗺️',n:'Waypoint',        k:'tp_wp'},
    {ic:'🏙️',n:'City Spots',     k:'tp_city'},
    {ic:'🏔️',n:'Hidden Spots',   k:'tp_hidden'},
    {ic:'👤',n:'To Player',       k:'tp_player'},
    {ic:'💾',n:'Saved Locs',      k:'tp_saved'},
  ]},
  world:{name:'World',lbl:'ENVIRONMENT',cats:[
    {ic:'🌦️',n:'Weather',         k:'wx_type'},
    {ic:'🕐',n:'Time Control',    k:'wx_time'},
    {ic:'🌊',n:'World Options',   k:'wx_world'},
  ]},
  pvp:{name:'PvP',lbl:'COMBAT',cats:[

// ══ STATE ══
let curNav='vehicle', curCat='vanilla', togStates={};
const menuEl=document.getElementById('menu');

// ══ SMOOTH NAV SWITCH ══
function switchNav(key){
  if(key===curNav) return;
  document.querySelectorAll('.ri').forEach(r=>r.classList.remove('on'));
  document.querySelector('[data-nav="'+key+'"]')?.classList.add('on');
  curNav=key;
  const d=NAV[key]; if(!d) return;
  // Slide cat panel
  const catBody=document.getElementById('cat-body');
  catBody.style.opacity='0';
  catBody.style.transform='translateX(6px)';
  document.getElementById('cat-lbl').textContent=d.lbl;
  document.getElementById('cat-name').textContent=d.name;
  setTimeout(()=>{
    renderCats(d.cats);
    catBody.style.transition='all .13s ease';
    catBody.style.opacity='1';
    catBody.style.transform='none';
    setTimeout(()=>catBody.style.transition='',150);
  },60);
}

function renderCats(cats){
  const el=document.getElementById('cat-body');
  el.innerHTML='';
  cats.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='ci'+(i===0?' on':'');
    d.innerHTML='<div class="ci-ic">'+c.ic+'</div><div class="ci-n">'+c.n+'</div><div class="ci-arr">›</div>';
    d.onclick=()=>{
      document.querySelectorAll('.ci').forEach(x=>x.classList.remove('on'));
      d.classList.add('on');
      curCat=c.k;
      renderItems(c.k);
    };
    el.appendChild(d);
    if(i===0){curCat=c.k;renderItems(c.k);}
  });
}

function renderItems(key){
  const data=ITEMS[key];
  const el=document.getElementById('items-body');
  const titleEl=document.getElementById('items-title');
  // Smooth slide
  el.style.opacity='0';el.style.transform='translateX(6px)';
  setTimeout(()=>{
    el.innerHTML='';
    el.style.transition='all .13s ease';
    el.style.opacity='1';el.style.transform='none';
    setTimeout(()=>el.style.transition='',150);
    if(!data){titleEl.textContent=key;showInfoPrev({n:key,em:'⚙️'});return;}
    titleEl.textContent=data.title;
    if(data.type==='vehicles'){
      data.items.forEach((item,i)=>{
        const d=buildLI(item,i===0);
        d.onclick=()=>{
          document.querySelectorAll('.li').forEach(x=>x.classList.remove('on'));
          d.classList.add('on');
          showVehPrev(item);
        };
        el.appendChild(d);
        if(i===0)showVehPrev(item);
      });
    } else {
      let first=true;
      (data.secs||[]).forEach(sec=>{
        if(sec.l){const sl=document.createElement('div');sl.className='sec-lbl';sl.textContent=sec.l;el.appendChild(sl);}
        (sec.items||[]).forEach(item=>{
          const d=buildLI(item,first);
          if(first){showActionPrev(item);first=false;}
          d.onclick=()=>{
            document.querySelectorAll('.li').forEach(x=>x.classList.remove('on'));
            d.classList.add('on');
            showActionPrev(item);
            if(item.action && !item.tog) execAction(item.action);
          };
          el.appendChild(d);
        });
      });
    }
  },70);
}

function buildLI(item,isOn){
  const d=document.createElement('div');
  d.className='li'+(isOn?' on':'');
  let right='<span class="li-arr">›</span>';
  if(item.b) right='<span class="badge '+(item.bc||'bc')+'">'+item.b+'</span>';
  if(item.tog){
    const on=togStates[item.action]||false;
    right='<div class="sw'+(on?' on':'')+'" data-action="'+item.action+'"></div>';
  }
  d.innerHTML='<div class="li-l"><div class="li-n">'+item.n+'</div></div>'+right;
  return d;
}

// ══ PREVIEW ══
function showVehPrev(item){
  document.getElementById('prev-name').textContent=item.n;
  document.getElementById('prev-tag').textContent=(item.cl||'VEH').toUpperCase();
  const body=document.getElementById('prev-body');
  body.classList.add('sld-up');setTimeout(()=>body.classList.remove('sld-up'),160);
  const hs=item.sp>0;
  body.innerHTML='<div class="vcard"><div class="vimg"><div class="vem">'+item.em+'</div></div>'
    +'<div class="vinf"><div class="vname">'+item.n+'</div><div class="vmeta">'+(item.cl||'Vehicle')+' — GTA V</div>'
    +(hs?'<div class="stat"><div class="sl">Speed</div><div class="sb"><div class="sf" style="width:'+item.sp+'%"></div></div><div class="sv">'+item.sp+'</div></div>'
        +'<div class="stat"><div class="sl">Accel</div><div class="sb"><div class="sf" style="width:'+item.ac+'%"></div></div><div class="sv">'+item.ac+'</div></div>'
        +'<div class="stat"><div class="sl">Handle</div><div class="sb"><div class="sf" style="width:'+item.ha+'%"></div></div><div class="sv">'+item.ha+'</div></div>':'')
    +'</div></div>'
    +'<div class="spbtn" onclick="execAction(\''+item.action+'\')">[ ENTER ] SPAWN</div>';
}

function showActionPrev(item){
  document.getElementById('prev-name').textContent=item.n;
  document.getElementById('prev-tag').textContent=item.tog?'TOGGLE':'ACTION';
  const body=document.getElementById('prev-body');
  body.classList.add('sld-up');setTimeout(()=>body.classList.remove('sld-up'),160);
  const on=togStates[item.action]||false;
  if(item.tog){
    body.innerHTML='<div class="icard"><div class="ic-icon">'+(on?'✅':'⭕')+'</div>'
      +'<div class="ic-name">'+item.n+'</div>'
      +'<div class="ic-sub">ENTER to toggle '+(on?'OFF':'ON')+'</div></div>'
      +'<div class="tgrid"><div class="trow"><span class="tn">'+item.n+'</span>'
      +'<div class="sw'+(on?' on':'')+'" onclick="execAction(\''+item.action+'\')"></div></div></div>';
  } else {
    body.innerHTML='<div class="icard"><div class="ic-icon">⚡</div>'
      +'<div class="ic-name">'+item.n+'</div>'
      +'<div class="ic-sub">Press ENTER to execute</div>'
      +'<div class="ic-btn" onclick="execAction(\''+item.action+'\')">[ ENTER ] EXECUTE</div></div>';
  }
}

function showInfoPrev(item){
  document.getElementById('prev-name').textContent=item.n;
  document.getElementById('prev-tag').textContent='INFO';
  document.getElementById('prev-body').innerHTML='<div class="icard"><div class="ic-icon">'+item.em+'</div><div class="ic-name">'+item.n+'</div><div class="ic-sub">Select from the list</div></div>';
}

// ══ EXECUTE ══
function execAction(action){
  if(!action) return;
  if(action.startsWith('toggle:')){
    const key=action.split(':')[1];
    togStates[action]=!togStates[action];
    const on=togStates[action];
    // Update all switches with this action
    document.querySelectorAll('[data-action="'+action+'"],.sw').forEach(sw=>{
      if(sw.dataset&&sw.dataset.action===action) sw.classList.toggle('on',on);
    });
    addAlert((on?'ON ':'OFF ')+key.replace('toggle:',''),on?'ok':'warn');
    sendLua({type:'action',action});
  } else {
    sendLua({type:'action',action});
  }
}

function sendLua(data){
  // DUI → HTML only; HTML cannot send to Lua directly
  // Lua reads nav state and executes
}

// ══ LUA MESSAGE HANDLER ══
let navItems=[], navIdx=0;
window.addEventListener('message',function(e){
  const d=e.data; if(!d||!d.type) return;
  console.log('[K2-HTML] Received message:', d.type, d);
  switch(d.type){
    case 'toggle':
      if(d.show) menuEl.classList.add('open');
      else menuEl.classList.remove('open');
      console.log('[K2-HTML] Menu toggled:', d.show);
      break;
    case 'notify':
      addAlert(d.text, d.color||'info');
      break;
    case 'toggle_state':
      if(d.key!=null){
        togStates['toggle:'+d.key]=d.value;
        document.querySelectorAll('[data-action="toggle:'+d.key+'"]').forEach(sw=>sw.classList.toggle('on',d.value));
      }
      break;
    case 'nav':
      handleNav(d);
      break;
    case 'update_hud':
      // HUD data from Lua (hp, armor, speed, features)
      console.log('[K2-HTML] HUD update:', d);
      break;
  }
});

function handleNav(d){
  if(d.action==='switchNav' && d.nav){
    switchNav(d.nav);
    navIdx=0;
  } else if(d.action==='selectCat'){
    const cats=document.querySelectorAll('.ci');
    cats.forEach((c,i)=>c.classList.toggle('on',i===(d.catIdx-1)));
    if(d.catKey){renderItems(d.catKey);navIdx=0;updateHL(0);}
  } else if(d.action==='enterSub'){
    if(d.catKey){renderItems(d.catKey);navIdx=0;}
    setTimeout(()=>updateHL(0),120);
  } else if(d.action==='selectItem'){
    const items=document.querySelectorAll('.li');
    if(!items.length)return;
    if(d.itemIdx>items.length) navIdx=items.length-1;
    else if(d.itemIdx<1) navIdx=0;
    else navIdx=d.itemIdx-1;
    updateHL(navIdx);
  } else if(d.action==='executeItem'){
    const items=document.querySelectorAll('.li');
    const idx=d.itemIdx>0?d.itemIdx-1:navIdx;
    if(items[idx]) items[idx].click();
  } else if(d.action==='goBack'){
    if(curCat){renderItems(curCat);navIdx=0;}
    setTimeout(()=>updateHL(0),120);
  }
}

function updateHL(idx){
  const items=document.querySelectorAll('.li');
  items.forEach((item,i)=>{
    item.classList.toggle('on',i===idx);
    if(i===idx){
      item.scrollIntoView({block:'nearest',behavior:'smooth'});
      // Update preview smoothly
      const data=ITEMS[curCat];
      if(data&&data.type==='vehicles'&&data.items&&data.items[i]) showVehPrev(data.items[i]);
      else {
        let flat=[],fi=0;
        if(data&&data.secs)(data.secs||[]).forEach(s=>(s.items||[]).forEach(it=>flat.push(it)));
        if(flat[i]) showActionPrev(flat[i]);
      }
    }
  });
}

document.querySelectorAll('.ri').forEach(ri=>{ri.onclick=()=>switchNav(ri.dataset.nav);});
document.getElementById('items-back').onclick=()=>{navIdx=0;renderItems(curCat);setTimeout(()=>updateHL(0),120);};
switchNav('vehicle');
console.log('[K2-HTML] Page fully loaded and initialized!');
